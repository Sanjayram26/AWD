<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Music Player</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <h1>🎵 Music Player</h1>

  <!-- Filters -->
  <div class="controls">
    <input type="text" id="search" placeholder="Search songs..." />

    <select id="genreFilter">
      <option>All</option>
      <option>Pop</option>
      <option>Rock</option>
    </select>

    <select id="artistFilter">
      <option>All</option>
      <option>The Weeknd</option>
      <option>Ed Sheeran</option>
      <option>Imagine Dragons</option>
      <option>Dua Lipa</option>
      <option>Linkin Park</option>
    </select>

    <button onclick="sortBy('title')">Sort by Title</button>
    <button onclick="sortBy('playCount')">Sort by Plays</button>
  </div>

  <!-- Now Playing -->
  <div id="nowPlaying" class="now-playing">
    Now Playing: None
  </div>

  <!-- Song Grid -->
  <div id="songGrid" class="grid"></div>

  <script src="app.js"></script>
</body>
</html>
